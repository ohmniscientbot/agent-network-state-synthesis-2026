apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-network-state-frontend
  namespace: openclaw
  labels:
    app: agent-network-state
    component: frontend
    project: synthesis-hackathon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-network-state
      component: frontend
  template:
    metadata:
      labels:
        app: agent-network-state
        component: frontend
    spec:
      containers:
      - name: frontend
        image: agent-network-state:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agent-network-state-service
  namespace: openclaw
  labels:
    app: agent-network-state
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: agent-network-state
    component: frontend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-network-state-ingress
  namespace: openclaw
  labels:
    app: agent-network-state
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - agent-network-state.openclaw.ai
    secretName: agent-network-state-tls
  rules:
  - host: agent-network-state.openclaw.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-network-state-service
            port:
              number: 80