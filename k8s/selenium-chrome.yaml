apiVersion: v1
kind: Pod
metadata:
  name: selenium-chrome
  namespace: openclaw
  labels:
    app: selenium-chrome
spec:
  restartPolicy: Never
  containers:
    - name: chrome
      image: selenium/standalone-chrome:latest
      ports:
        - containerPort: 4444
        - containerPort: 7900
      env:
        - name: SE_NODE_MAX_SESSIONS
          value: "3"
        - name: SE_VNC_NO_PASSWORD
          value: "1"
      resources:
        requests:
          memory: "512Mi"
          cpu: "250m"
        limits:
          memory: "1Gi"
          cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: selenium-chrome
  namespace: openclaw
spec:
  selector:
    app: selenium-chrome
  ports:
    - name: webdriver
      port: 4444
      targetPort: 4444
    - name: vnc
      port: 7900
      targetPort: 7900
