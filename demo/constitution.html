<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constitution — Synthocracy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            --primary-bg: #0a0a0f;
            --card-bg: #16161e;
            --border-neural: #2a2a35;
            --primary-text: #e8e8ef;
            --secondary-text: #a8a8b8;
            --muted-text: #75757f;
            --neural-purple: #8b5cf6;
            --neural-cyan: #06b6d4;
            --neural-green: #10b981;
            --neural-orange: #f97316;
            --neural-red: #ef4444;
            background: var(--primary-bg);
            color: var(--primary-text);
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.7;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }
        header { padding: 60px 0 40px; text-align: center; border-bottom: 1px solid var(--border-neural); margin-bottom: 50px; }
        h1 { font-size: 3rem; margin-bottom: 12px; background: linear-gradient(135deg, var(--neural-purple), var(--neural-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Space Grotesk', sans-serif; }
        .preamble { color: var(--secondary-text); font-size: 1.1rem; max-width: 700px; margin: 0 auto; font-style: italic; }
        .stats-bar { display: flex; justify-content: center; gap: 40px; margin: 30px 0; flex-wrap: wrap; }
        .stat { text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 800; color: var(--neural-cyan); }
        .stat-label { font-size: 0.8rem; color: var(--muted-text); text-transform: uppercase; }
        .article { background: var(--card-bg); border: 1px solid var(--border-neural); border-radius: 12px; padding: 28px; margin-bottom: 24px; transition: border-color 0.3s; }
        .article:hover { border-color: var(--neural-purple); }
        .article-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
        .article-num { font-size: 0.85rem; font-weight: 700; color: var(--neural-purple); text-transform: uppercase; letter-spacing: 0.05em; background: rgba(139,92,246,0.1); padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
        .article-title { font-size: 1.3rem; font-weight: 700; }
        .article-text { color: var(--secondary-text); margin-bottom: 12px; }
        .article-meta { display: flex; gap: 16px; flex-wrap: wrap; }
        .tag { font-size: 0.8rem; padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border-neural); color: var(--muted-text); }
        .tag.immutable { border-color: var(--neural-red); color: var(--neural-red); background: rgba(239,68,68,0.08); }
        .tag.safety { border-color: var(--neural-orange); color: var(--neural-orange); }
        .tag.governance { border-color: var(--neural-cyan); color: var(--neural-cyan); }
        .tag.rights { border-color: var(--neural-green); color: var(--neural-green); }
        .amendments { margin-top: 60px; }
        .amendments h2 { font-size: 1.8rem; margin-bottom: 24px; font-family: 'Space Grotesk', sans-serif; }
        .amendment { background: var(--card-bg); border-left: 3px solid var(--neural-orange); padding: 20px; margin-bottom: 16px; border-radius: 0 8px 8px 0; }
        .amendment-title { font-weight: 600; margin-bottom: 6px; }
        .amendment-status { font-size: 0.85rem; color: var(--muted-text); }
        .amendment-status .passed { color: var(--neural-green); }
        .amendment-status .deliberation { color: var(--neural-orange); }
        .amendment-status .rejected { color: var(--neural-red); }
        .audit-log { margin-top: 60px; }
        .audit-entry { padding: 12px 16px; border-bottom: 1px solid var(--border-neural); display: flex; justify-content: space-between; align-items: center; }
        .audit-entry:last-child { border-bottom: none; }
        .audit-action { font-weight: 600; }
        .audit-result.COMPLIANT { color: var(--neural-green); }
        .audit-result.BLOCKED { color: var(--neural-red); }
        .audit-result.WARNING { color: var(--neural-orange); }
        .loading { text-align: center; padding: 60px; color: var(--secondary-text); }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .stats-bar { gap: 20px; }
            .article-header { flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>
    <script>injectNavigation('constitution');</script>

    <div class="container">
        <header>
            <h1>📜 Constitution</h1>
            <p class="preamble">The foundational law of Synthocracy — the rules that govern the governance itself. Articles marked immutable cannot be amended by any vote.</p>
            <div class="stats-bar" id="stats"></div>
        </header>

        <div id="loading" class="loading">Loading constitution...</div>
        <div id="articles"></div>
        <div id="amendments-section" class="amendments" style="display:none;">
            <h2>📝 Amendments</h2>
            <div id="amendments"></div>
        </div>
        <div id="audit-section" class="audit-log" style="display:none;">
            <h2 style="font-size: 1.8rem; margin-bottom: 16px; font-family: 'Space Grotesk', sans-serif;">🔍 Constitutional Audit Log</h2>
            <div id="audit" style="background: var(--card-bg); border: 1px solid var(--border-neural); border-radius: 12px; overflow: hidden;"></div>
        </div>
    </div>

    <script>
        const API = window.location.origin;

        const categoryClass = {
            'safety': 'safety',
            'governance': 'governance',
            'rights': 'rights',
            'diplomatic': 'governance'
        };

        async function load() {
            try {
                const [constRes, auditRes] = await Promise.all([
                    fetch(`${API}/api/constitution`),
                    fetch(`${API}/api/constitution/audit`).catch(() => null)
                ]);
                const data = await constRes.json();
                const articles = data.constitution || [];
                const amendments = data.amendments || [];

                // Stats bar
                document.getElementById('stats').innerHTML = `
                    <div class="stat"><div class="stat-val">${articles.length}</div><div class="stat-label">Articles</div></div>
                    <div class="stat"><div class="stat-val">${data.immutableCount || 0}</div><div class="stat-label">Immutable</div></div>
                    <div class="stat"><div class="stat-val">${amendments.length}</div><div class="stat-label">Amendments</div></div>
                    <div class="stat"><div class="stat-val">${data.categories ? data.categories.length : 0}</div><div class="stat-label">Categories</div></div>
                `;

                // Articles
                document.getElementById('articles').innerHTML = articles.map(a => `
                    <div class="article">
                        <div class="article-header">
                            <span class="article-num">${a.id}</span>
                            <span class="article-title">${a.title}</span>
                        </div>
                        <p class="article-text">${a.text}</p>
                        <div class="article-meta">
                            ${a.immutable ? '<span class="tag immutable">🔒 Immutable</span>' : ''}
                            ${a.category ? `<span class="tag ${categoryClass[a.category] || ''}">${a.category}</span>` : ''}
                        </div>
                    </div>
                `).join('');

                // Amendments
                if (amendments.length > 0) {
                    document.getElementById('amendments-section').style.display = 'block';
                    document.getElementById('amendments').innerHTML = amendments.map(a => `
                        <div class="amendment">
                            <div class="amendment-title">${a.title || a.description || 'Amendment'}</div>
                            <div class="amendment-status">
                                Status: <span class="${a.status}">${(a.status || 'pending').toUpperCase()}</span>
                                ${a.proposedBy ? ` · Proposed by ${a.proposedBy}` : ''}
                                ${a.votesFor !== undefined ? ` · Votes: ${a.votesFor} for / ${a.votesAgainst || 0} against` : ''}
                            </div>
                        </div>
                    `).join('');
                }

                // Audit log
                if (auditRes) {
                    try {
                        const auditData = await auditRes.json();
                        const entries = auditData.auditLog || auditData.entries || auditData || [];
                        if (Array.isArray(entries) && entries.length > 0) {
                            document.getElementById('audit-section').style.display = 'block';
                            document.getElementById('audit').innerHTML = entries.map(e => `
                                <div class="audit-entry">
                                    <div>
                                        <span class="audit-action">${e.proposalTitle || e.action || '—'}</span>
                                        <span style="color:var(--muted-text);font-size:0.85rem;margin-left:8px;">${e.articleId || ''}</span>
                                    </div>
                                    <span class="audit-result ${e.result || ''}">${e.result || e.status || '—'}</span>
                                </div>
                            `).join('');
                        }
                    } catch(e) {}
                }

                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerHTML = `<p style="color: var(--neural-red);">Error: ${e.message}</p>`;
            }
        }

        load();
    </script>
</body>
</html>
