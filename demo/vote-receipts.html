<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Receipt Ledger - Synthocracy</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #0f0f1a;
            --bg-card: #12121f;
            --neural-blue: #00d4ff;
            --neural-purple: #8b5cf6;
            --neural-green: #00ff88;
            --neural-red: #ff4444;
            --neural-gold: #ffd700;
            --text-primary: #e8e8f0;
            --text-secondary: #9090a8;
            --border-color: #1e1e30;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        .page-container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
        h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--neural-blue), var(--neural-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem; }
        .chain-banner {
            background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(139,92,246,0.08));
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
        }
        .chain-stat { display: flex; flex-direction: column; gap: 0.2rem; }
        .chain-stat .label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .chain-stat .value { font-family: monospace; font-size: 0.9rem; color: var(--neural-blue); }
        .chain-stat .value.green { color: var(--neural-green); }
        .chain-stat .value.gold { color: var(--neural-gold); }
        .verify-btn {
            margin-left: auto;
            background: linear-gradient(135deg, var(--neural-green), #00cc6a);
            color: #000;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .verify-btn:hover { opacity: 0.85; }
        .verify-result {
            display: none;
            margin-bottom: 1.5rem;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.88rem;
        }
        .verify-result.pass { background: rgba(0,255,136,0.1); border: 1px solid var(--neural-green); color: var(--neural-green); }
        .verify-result.fail { background: rgba(255,68,68,0.1); border: 1px solid var(--neural-red); color: var(--neural-red); }
        .section-title { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); }
        .receipt-grid { display: flex; flex-direction: column; gap: 0.75rem; }
        .receipt-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        .receipt-card:hover { border-color: rgba(0,212,255,0.35); }
        .receipt-card.expanded { border-color: rgba(139,92,246,0.5); background: #14142a; }
        .receipt-header { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .receipt-index { background: rgba(0,212,255,0.12); color: var(--neural-blue); border-radius: 6px; padding: 0.2rem 0.55rem; font-family: monospace; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
        .vote-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .vote-badge.for { background: rgba(0,255,136,0.15); color: var(--neural-green); }
        .vote-badge.against { background: rgba(255,68,68,0.15); color: var(--neural-red); }
        .vote-badge.abstain { background: rgba(255,215,0,0.15); color: var(--neural-gold); }
        .receipt-agent { font-weight: 600; color: var(--text-primary); }
        .receipt-proposal { color: var(--text-secondary); font-size: 0.88rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .receipt-hash { font-family: monospace; font-size: 0.72rem; color: var(--text-secondary); margin-left: auto; flex-shrink: 0; }
        .receipt-details { display: none; margin-top: 1rem; border-top: 1px solid var(--border-color); padding-top: 1rem; }
        .receipt-card.expanded .receipt-details { display: block; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .detail-item { display: flex; flex-direction: column; gap: 0.2rem; }
        .detail-label { font-size: 0.72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .detail-value { font-family: monospace; font-size: 0.82rem; color: var(--neural-blue); word-break: break-all; }
        .detail-value.reason { font-family: inherit; color: var(--text-primary); font-size: 0.88rem; }
        .chain-link { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem; padding: 0.5rem 0.75rem; background: rgba(139,92,246,0.08); border-radius: 8px; }
        .chain-link .arrow { color: var(--neural-purple); font-size: 1rem; }
        .chain-link .hash-pair { display: flex; flex-direction: column; gap: 0.2rem; font-family: monospace; font-size: 0.72rem; }
        .chain-link .prev { color: var(--text-secondary); }
        .chain-link .curr { color: var(--neural-purple); }
        .pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; }
        .page-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-secondary); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.88rem; transition: all 0.2s; }
        .page-btn:hover { border-color: var(--neural-blue); color: var(--neural-blue); }
        .page-btn.active { background: rgba(0,212,255,0.12); border-color: var(--neural-blue); color: var(--neural-blue); }
        .loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
        @media (max-width: 700px) {
            .detail-grid { grid-template-columns: 1fr; }
            .receipt-hash { display: none; }
        }
    </style>
</head>
<body>
    <script src="/shared-nav.js"></script>
    <script>injectNavigation('vote-receipts');</script>

    <div class="page-container">
        <h1>🧾 Vote Receipt Ledger</h1>
        <p class="subtitle">Every vote generates a cryptographic receipt. Receipts are chained via SHA-256 hashes — any tampering breaks the chain. ERC-8004 compliant audit trail.</p>

        <div class="chain-banner" id="chainBanner">
            <div class="chain-stat">
                <span class="label">Total Receipts</span>
                <span class="value gold" id="totalReceipts">—</span>
            </div>
            <div class="chain-stat">
                <span class="label">Chain Head Hash</span>
                <span class="value" id="chainHead" style="font-size:0.72rem;">loading…</span>
            </div>
            <div class="chain-stat">
                <span class="label">Genesis Block</span>
                <span class="value" style="font-size:0.72rem;">000000…000000</span>
            </div>
            <button class="verify-btn" onclick="verifyChain()">🔐 Verify Chain Integrity</button>
        </div>

        <div class="verify-result" id="verifyResult"></div>

        <div class="section-title">Receipt Chain — Newest First</div>
        <div class="receipt-grid" id="receiptGrid"><div class="loading">Loading receipt ledger…</div></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        let allReceipts = [];
        let currentPage = 0;
        const PAGE_SIZE = 20;

        async function loadReceipts() {
            try {
                const res = await fetch('/api/receipts?limit=200&offset=0');
                const data = await res.json();
                allReceipts = data.receipts.reverse(); // newest first
                document.getElementById('totalReceipts').textContent = data.total;
                const head = data.chainHead;
                document.getElementById('chainHead').textContent = head ? (head.slice(0,8) + '…' + head.slice(-8)) : '—';
                renderPage(0);
            } catch (e) {
                document.getElementById('receiptGrid').innerHTML = '<div class="loading">Error loading receipts. Make sure the server is running.</div>';
            }
        }

        function renderPage(page) {
            currentPage = page;
            const start = page * PAGE_SIZE;
            const items = allReceipts.slice(start, start + PAGE_SIZE);
            const grid = document.getElementById('receiptGrid');
            if (items.length === 0) {
                grid.innerHTML = '<div class="loading">No receipts found.</div>';
                return;
            }
            grid.innerHTML = items.map((r, i) => `
                <div class="receipt-card" id="card-${start+i}" onclick="toggleCard(${start+i})">
                    <div class="receipt-header">
                        <span class="receipt-index">#${r.index}</span>
                        <span class="vote-badge ${r.vote}">${r.vote === 'for' ? '✅ FOR' : r.vote === 'against' ? '❌ AGAINST' : '⚪ ABSTAIN'}</span>
                        <span class="receipt-agent">${escHtml(r.agentName || r.agentId)}</span>
                        <span class="receipt-proposal" title="${escHtml(r.proposalTitle || r.proposalId)}">${escHtml(r.proposalTitle || r.proposalId)}</span>
                        <span class="receipt-hash">${r.hash ? r.hash.slice(0,12)+'…' : ''}</span>
                    </div>
                    <div class="receipt-details" id="details-${start+i}">
                        <div class="detail-grid">
                            <div class="detail-item">
                                <span class="detail-label">Agent ID</span>
                                <span class="detail-value">${escHtml(r.agentId)}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Timestamp</span>
                                <span class="detail-value">${r.timestamp ? new Date(r.timestamp).toLocaleString() : '—'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Voting Power</span>
                                <span class="detail-value">${r.votingPower} → √${r.quadraticWeight} (quadratic)</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Proposal ID</span>
                                <span class="detail-value">${escHtml(r.proposalId)}</span>
                            </div>
                            <div class="detail-item" style="grid-column:1/-1">
                                <span class="detail-label">Reason</span>
                                <span class="detail-value reason">${escHtml(r.reason || 'No reason provided')}</span>
                            </div>
                        </div>
                        <div class="chain-link">
                            <span class="arrow">🔗</span>
                            <div class="hash-pair">
                                <span class="prev">prevHash: ${r.prevHash ? (r.prevHash.slice(0,16)+'…'+r.prevHash.slice(-16)) : '—'}</span>
                                <span class="curr">  thisHash: ${r.hash ? (r.hash.slice(0,16)+'…'+r.hash.slice(-16)) : '—'}</span>
                            </div>
                        </div>
                        <div style="margin-top:0.75rem">
                            <a href="/api/receipts/${r.index}" target="_blank" style="color:var(--neural-purple);font-size:0.82rem;text-decoration:none;">📋 View raw receipt JSON ↗</a>
                        </div>
                    </div>
                </div>
            `).join('');
            renderPagination();
        }

        function toggleCard(idx) {
            const card = document.getElementById(`card-${idx}`);
            card.classList.toggle('expanded');
        }

        function renderPagination() {
            const total = allReceipts.length;
            const pages = Math.ceil(total / PAGE_SIZE);
            if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
            let html = '';
            for (let i = 0; i < pages; i++) {
                html += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="renderPage(${i})">${i + 1}</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        async function verifyChain() {
            const el = document.getElementById('verifyResult');
            el.style.display = 'block';
            el.className = 'verify-result';
            el.textContent = '🔄 Verifying chain integrity…';
            try {
                const res = await fetch('/api/receipts/verify/chain');
                const data = await res.json();
                if (data.valid) {
                    el.className = 'verify-result pass';
                    el.textContent = data.message;
                } else {
                    el.className = 'verify-result fail';
                    el.textContent = data.message + ' | Errors: ' + JSON.stringify(data.errors);
                }
            } catch (e) {
                el.className = 'verify-result fail';
                el.textContent = '❌ Verification request failed: ' + e.message;
            }
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        loadReceipts();
    </script>
</body>
</html>
